 <!DOCTYPE html>
<html>
<head>
  <title>Chapter 1 Test</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .question {
      display: none;
      text-align: left;
    }

    .active {
      display: block;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      color: #22c55e;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Chapter 1 Physics Test</h2>
<h3>Time Left: <span id="time">300</span> sec</h3>

<form id="quizForm">

<!-- Q1 -->
<div class="question active">
<p>1. SI unit of electric current?</p>
<input type="radio" name="q1" value="A"> Ampere<br>
<input type="radio" name="q1" value="B"> Volt<br>
<input type="radio" name="q1" value="C"> Ohm<br>
<input type="radio" name="q1" value="D"> Watt<br>
</div>

<!-- Q2 -->
<div class="question">
<p>2. Unit of charge?</p>
<input type="radio" name="q2" value="A"> Joule<br>
<input type="radio" name="q2" value="B"> Coulomb<br>
<input type="radio" name="q2" value="C"> Newton<br>
<input type="radio" name="q2" value="D"> Ampere<br>
</div>

<!-- Q3 -->
<div class="question">
<p>3. Ohm's Law kisne diya?</p>
<input type="radio" name="q3" value="A"> Newton<br>
<input type="radio" name="q3" value="B"> Einstein<br>
<input type="radio" name="q3" value="C"> Ohm<br>
<input type="radio" name="q3" value="D"> Faraday<br>
</div>

<!-- Q4 -->
<div class="question">
<p>4. Potential difference unit?</p>
<input type="radio" name="q4" value="A"> Watt<br>
<input type="radio" name="q4" value="B"> Volt<br>
<input type="radio" name="q4" value="C"> Ampere<br>
<input type="radio" name="q4" value="D"> Ohm<br>
</div>

<!-- Q5 -->
<div class="question">
<p>5. Resistance unit?</p>
<input type="radio" name="q5" value="A"> Volt<br>
<input type="radio" name="q5" value="B"> Ohm<br>
<input type="radio" name="q5" value="C"> Ampere<br>
<input type="radio" name="q5" value="D"> Joule<br>
</div>

</form>

<button type="button" onclick="prevQuestion()">Previous</button>
<button type="button" onclick="nextQuestion()">Next</button>
<button type="button" onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

</div>

<script>

let answers = {
  q1: "A",
  q2: "B",
  q3: "C",
  q4: "B",
  q5: "B"
};

// TIMER
let timeLeft = 300;
let timer = setInterval(function() {
  timeLeft--;
  document.getElementById("time").innerText = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    alert("Time's up!");
    submitQuiz();
  }
}, 1000);

// SLIDE SYSTEM
let current = 0;
let questions = document.querySelectorAll(".question");

function showQuestion(index) {
  questions.forEach(q => q.classList.remove("active"));
  questions[index].classList.add("active");
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    showQuestion(current);
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    showQuestion(current);
  }
}

// RESULT
function submitQuiz() {
  clearInterval(timer);

  let score = 0;

  for (let i = 1; i <= questions.length; i++) {
    let q = document.querySelector('input[name="q' + i + '"]:checked');
    if (q && q.value === answers["q" + i]) {
      score++;
    }
  }

  document.getElementById("result").innerText =
    "Your Score: " + score + "/" + questions.length;
}

</script>

</body>
                                                      </html>
