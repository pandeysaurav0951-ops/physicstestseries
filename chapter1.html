 <!DOCTYPE html>
<html>
<head>
  <title>Chapter 1 - Physics Test</title>
  <style>
    body{margin:0;font-family:'Segoe UI',Arial;background:#0f172a;color:white;}
    .container{max-width:800px;margin:20px auto;padding:20px;border-radius:10px;background:#1e293b;}
    .answer-btn{display:block;margin:10px 0;padding:10px;width:100%;background:#38bdf8;border:none;border-radius:5px;cursor:pointer;}
    .answer-btn:hover{background:#0ea5e9;}
    .correct{background:green;color:white;}
    .wrong{background:red;color:white;}
    #tracker button{width:40px;height:40px;margin:5px;border:none;border-radius:5px;font-weight:bold;cursor:pointer;}
  </style>
</head>
<body>

<div class="container">
  <h2>Chapter 1 - Electric Charges & Fields</h2>
  <div id="question-container"></div>
  <div id="tracker"></div>
</div>

<script>
let currentQ=0;
let userAnswers=[];
const questions=[
  {q:"What is the SI unit of electric charge?", options:["Coulomb","Newton","Joule","Watt"], answer:0},
  {q:"Why do like charges repel and unlike charges attract?", options:["Due to gravity","Magnetic forces","Electrostatic forces","Friction"], answer:2},
  {q:"Define Coulomb's law.", options:["Force proportional to mass","Force proportional to charge product / distance^2","Voltage difference","Resistance"], answer:1},
  {q:"Characteristics of a conductor?", options:["No free electrons","Allows flow of charge","Stores charge only","Insulates"], answer:1},
  {q:"Principle of superposition of electric forces?", options:["For magnetic forces","Sum of individual forces","Subtract forces","Depends on charge sign"], answer:1},
  {q:"Two charges +3 µC and -6 µC 5cm apart, force?", options:["32.4 N","64.8 N","9 N","12 N"], answer:1},
  {q:"Force doubles when distance halves?", options:["Yes","No","Depends","Sometimes"], answer:0},
  {q:"Charge +2C at origin, force on +4C at x=0.5m?", options:["16 N","32 N","64 N","8 N"], answer:1},
  {q:"Coulomb's law applicable to?", options:["Point charges","All bodies","Conductors only","Insulators only"], answer:0},
  {q:"Definition of electric field intensity?", options:["Force per unit mass","Force per unit charge","Voltage per meter","Charge per meter"], answer:1},
  {q:"Electric field due to point charge?", options:["E=kq/r^2","E=qr","E=k/r^2","E=qr^2"], answer:0},
  {q:"A +5 µC charge produces 2000 N/C, distance?", options:["0.15 m","0.5 m","0.25 m","1 m"], answer:2},
  {q:"Direction of field due to negative charge?", options:["Away from charge","Towards charge","Perpendicular","Random"], answer:1},
  {q:"Properties of electric field lines?", options:["Start on positive, end negative","Never intersect","Both","None"], answer:2},
  {q:"Pattern of field lines for unlike charges?", options:["Repel each other","Start on +, end on -","Random","Circle"], answer:1},
  {q:"Why lines never intersect?", options:["Force unique at a point","No reason","Random","Depends on charge"], answer:0},
  {q:"Define electric dipole and dipole moment", options:["Two charges of equal magnitude opposite sign, p=qd","Single charge only","Two positive charges","Neutral body"], answer:0},
  {q:"Electric field on axial line of dipole?", options:["E=kq/r^2","E=1/4πε0*2p/r^3","Zero","Depends on medium"], answer:1},
  {q:"Field axial vs equatorial?", options:["Axial stronger","Equatorial stronger","Same","Zero both"], answer:0},
  {q:"Torque on dipole in uniform field?", options:["τ=p×E","τ=qE","τ=0","τ=kq/r^2"], answer:0},
  {q:"Electric field due to uniform rod?", options:["Use superposition","Use Coulomb law directly","Cannot calculate","Depends on charge"], answer:0},
  {q:"Field inside spherical shell?", options:["Zero","Non-zero","Infinite","Depends"], answer:0},
  {q:"Field on surface of charged sphere?", options:["E=kQ/R^2","E=0","E=kQ/R","Depends"], answer:0},
  {q:"Van de Graaff generator produces?", options:["Static charges","Magnetic field","Current","Voltage only"], answer:0},
  {q:"Electric field used in CRO?", options:["Deflect electron beam","Measure temperature","Measure current","Magnetic alignment"], answer:0}
];

// Tracker buttons
const trackerDiv=document.getElementById('tracker');
questions.forEach((q,i)=>{
  const btn=document.createElement('button');
  btn.id="t-"+i; btn.innerText=i+1; trackerDiv.appendChild(btn);
});

// Show question
function showQuestion(){
  if(currentQ>=questions.length){alert("Test Complete!"); return;}
  const q=questions[currentQ];
  const container=document.getElementById('question-container');
  container.innerHTML=`<strong>Q${currentQ+1}: ${q.q}</strong>`;
  ["A","B","C","D"].forEach((l,i)=>{
    const btn=document.createElement('button');
    btn.className="answer-btn"; btn.innerText=`${l}. ${q.options[i]}`;
    btn.onclick=()=>selectAnswer(i);
    container.appendChild(btn);
  });
}

// Select answer
function selectAnswer(idx){
  userAnswers.push(idx);
  const btn=document.getElementById("t-"+currentQ);
  if(idx===questions[currentQ].answer) btn.style.background="green"; else btn.style.background="red";
  currentQ++; showQuestion();
}

// Start first question automatically
showQuestion();
</script>
</body>
</html>
