   <!DOCTYPE html>
<html>
<head>
  <title>Chapter 1 Test</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .question {
      display: none;
      text-align: left;
    }

    .active {
      display: block;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Chapter 1 Test</h2>
<h3>Time Left: <span id="time">300</span> sec</h3>

<form id="quizForm">

<div class="question active">
<p>1. SI unit of Force?</p>
<input type="radio" name="q1" value="correct"> Newton<br>
<input type="radio" name="q1" value="wrong"> Joule<br>
<input type="radio" name="q1" value="wrong"> Watt<br>
<input type="radio" name="q1" value="wrong"> Pascal<br>
</div>

<div class="question">
<p>2. SI unit of length?</p>
<input type="radio" name="q2" value="correct"> Meter<br>
<input type="radio" name="q2" value="wrong"> Second<br>
<input type="radio" name="q2" value="wrong"> Kg<br>
<input type="radio" name="q2" value="wrong"> Ampere<br>
</div>

<div class="question">
<p>3. SI unit of mass?</p>
<input type="radio" name="q3" value="correct"> Kg<br>
<input type="radio" name="q3" value="wrong"> Meter<br>
<input type="radio" name="q3" value="wrong"> Second<br>
<input type="radio" name="q3" value="wrong"> Joule<br>
</div>

</form>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

</div>

<script>

window.onload = function() {

let current = 0;
let questions = document.querySelectorAll(".question");

function showQuestion(index) {
  questions.forEach(q => q.classList.remove("active"));
  questions[index].classList.add("active");
}

window.nextQuestion = function() {
  if (current < questions.length - 1) {
    current++;
    showQuestion(current);
  }
}

window.prevQuestion = function() {
  if (current > 0) {
    current--;
    showQuestion(current);
  }
}

window.submitQuiz = function() {
  let score = 0;

  for (let i = 1; i <= questions.length; i++) {
    let q = document.querySelector('input[name="q' + i + '"]:checked');
    if (q && q.value === "correct") score++;
  }

  document.getElementById("result").innerText =
    "Your Score: " + score + "/" + questions.length;
}

// TIMER
let timeLeft = 300;

let timer = setInterval(function() {
  timeLeft--;
  document.getElementById("time").innerText = timeLeft;

  if (timeLeft <= 0) {
    clearInterval(timer);
    alert("Time's up!");
    submitQuiz();
  }
}, 1000);

}

</script>

</body>
</html>
