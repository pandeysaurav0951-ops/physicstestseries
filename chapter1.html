 <!DOCTYPE html>
<html>
<head>
  <title>Chapter 1 Test</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }

    .question {
      display: none;
      text-align: left;
    }

    .active {
      display: block;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

<h2>Chapter 1 Test</h2>

<form id="quizForm">

<!-- Question 1 -->
<div class="question active">
  <p>1. SI unit of Force?</p>
  <input type="radio" name="q1" value="correct"> Newton<br>
  <input type="radio" name="q1" value="wrong"> Joule<br>
  <input type="radio" name="q1" value="wrong"> Watt<br>
  <input type="radio" name="q1" value="wrong"> Pascal<br>
</div>

<!-- Question 2 -->
<div class="question">
  <p>2. Speed of light?</p>
  <input type="radio" name="q2" value="correct"> 3×10^8 m/s<br>
  <input type="radio" name="q2" value="wrong"> 1×10^6 m/s<br>
  <input type="radio" name="q2" value="wrong"> 5×10^7 m/s<br>
  <input type="radio" name="q2" value="wrong"> 10^5 m/s<br>
</div>

<!-- Question 3 -->
<div class="question">
  <p>3. Unit of Energy?</p>
  <input type="radio" name="q3" value="correct"> Joule<br>
  <input type="radio" name="q3" value="wrong"> Watt<br>
  <input type="radio" name="q3" value="wrong"> Newton<br>
  <input type="radio" name="q3" value="wrong"> Pascal<br>
</div>

<!-- aur isi tarah 20 questions bana sakte ho -->

</form>

<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
<button onclick="submitQuiz()">Submit</button>

<h3 id="result"></h3>

</div>

<script>

let current = 0;
let questions = document.querySelectorAll(".question");

function showQuestion(index) {
  questions.forEach(q => q.classList.remove("active"));
  questions[index].classList.add("active");
}

function nextQuestion() {
  if (current < questions.length - 1) {
    current++;
    showQuestion(current);
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    showQuestion(current);
  }
}

function submitQuiz() {
  let score = 0;

  for (let i = 1; i <= questions.length; i++) {
    let q = document.querySelector('input[name="q' + i + '"]:checked');
    if (q && q.value === "correct") score++;
  }

  document.getElementById("result").innerText =
    "Your Score: " + score + "/" + questions.length;
}

</script>

</body>
</html>
