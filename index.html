 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Test Series</title>
<style>
  body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
  header { background:#4CAF50; color:white; padding:20px; text-align:center; }
  nav a { color:white; margin:0 10px; text-decoration:none; font-weight:bold; }
  section { max-width:800px; margin:30px auto; background:white; padding:20px; border-radius:8px; }
  button { padding:10px 20px; margin-top:15px; background:#4CAF50; color:white; border:none; border-radius:5px; cursor:pointer; }
  .question { margin:20px 0; }
  .answer { display:block; margin:8px 0; padding:10px; background:#81C784; color:white; border:none; border-radius:5px; cursor:pointer; width:100%; }
  .correct { color:green; font-weight:bold; }
  .wrong { color:red; font-weight:bold; }
  footer { text-align:center; padding:20px; background:#333; color:white; margin-top:30px; }
</style>
</head>
<body>

<header>
  <h1>Simple Test Series</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#tests">Tests</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="home">
  <h2>Welcome to Test Series</h2>
  <p>Attempt tests and get instant results!</p>
  <button onclick="startTest()">Start Test</button>
</section>

<section id="tests" style="display:none;">
  <div id="question-container"></div>
</section>

<section id="results" style="display:none;">
  <h2>Test Results</h2>
  <p id="score"></p>
  <div id="review"></div>
</section>

<footer>
  &copy; 2026 Simple Test Series | Contact: info@testseries.com
</footer>

<script>
  const questions = [
    { q: "What is 2 + 2?", options:["3","4","5","6"], answer:1 },
    { q: "Capital of India?", options:["Delhi","Mumbai","Kolkata","Chennai"], answer:0 },
    { q: "Which planet is known as Red Planet?", options:["Earth","Venus","Mars","Jupiter"], answer:2 }
  ];

  let currentQ = 0;
  let userAnswers = [];

  function startTest(){
    document.getElementById('home').style.display = 'none';
    document.getElementById('tests').style.display = 'block';
    showQuestion();
  }

  function showQuestion(){
    const container = document.getElementById('question-container');
    container.innerHTML = "";
    if(currentQ < questions.length){
      const qObj = questions[currentQ];
      const qEl = document.createElement('div');
      qEl.classList.add('question');
      qEl.innerHTML = `<strong>Q${currentQ+1}: ${qObj.q}</strong>`;
      container.appendChild(qEl);

      qObj.options.forEach((opt, idx)=>{
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.classList.add('answer');
        btn.onclick = ()=> selectAnswer(idx);
        container.appendChild(btn);
      });
    } else {
      submitTest();
    }
  }

  function selectAnswer(idx){
    userAnswers.push(idx);
    currentQ++;
    showQuestion(); // Auto next question
  }

  function submitTest(){
    document.getElementById('tests').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    let score = 0;
    let reviewHTML = "<h3>Review:</h3>";
    questions.forEach((q,i)=>{
      if(userAnswers[i] === q.answer) score++;
      reviewHTML += `<p>Q${i+1}: Your answer: ${q.options[userAnswers[i]] || "No Answer"} | Correct: ${q.options[q.answer]} 
      ${userAnswers[i] === q.answer ? '<span class="correct">✔</span>' : '<span class="wrong">✖</span>'}</p>`;
    });

    document.getElementById('score').innerText = `Your Score: ${score} / ${questions.length}`;
    document.getElementById('review').innerHTML = reviewHTML;
  }
</script>

</body>
</html>
