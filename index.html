 <!DOCTYPE html>
<html>
<head>
  <title>Physics Test Dashboard</title>
  <style>
    body {margin:0; font-family:'Segoe UI', Arial; background: linear-gradient(135deg, #0f172a, #1e293b); color:white;}
    .navbar {display:flex; justify-content:space-between; padding:15px 25px; background:#020617;}
    .logo {font-size:20px; font-weight:bold; color:#38bdf8;}
    .menu a {color:white; margin-left:20px; text-decoration:none;}
    .menu a:hover {color:#38bdf8;}
    .hero, .form-section, .stats, .container, .test-section, .results {max-width:900px; margin:30px auto; padding:20px; border-radius:10px; background:#1e293b;}
    .hero h1 {color:#38bdf8; text-align:center;}
    .stats {display:flex; justify-content:center; gap:20px; text-align:center;}
    .box {width:120px; padding:20px; border-radius:10px;}
    .container {display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px;}
    .card {padding:20px; border-radius:15px; text-align:center; transition:0.3s;}
    .card:hover {transform:translateY(-10px); box-shadow:0 0 15px #38bdf8;}
    .btn {margin-top:10px; padding:10px 20px; background:#38bdf8; border:none; border-radius:8px; cursor:pointer; font-weight:bold;}
    .btn:hover {background:#0ea5e9;}
    input {padding:10px; width:95%; margin:8px 0; border-radius:5px; border:none;}
    .test-question {margin:20px 0;}
    .answer-btn {display:block; margin:10px 0; padding:10px; width:100%; background:#38bdf8; border:none; border-radius:5px; cursor:pointer;}
    .answer-btn:hover {background:#0ea5e9;}
    .correct {color:green; font-weight:bold;}
    .wrong {color:red; font-weight:bold;}
    .footer {text-align:center; padding:15px; background:#020617; margin-top:20px; font-size:14px;}
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Physics Test</div>
  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Chapters</a>
    <a href="#">Result</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to Physics Test Series</h1>
  <p>Practice Chapter-wise Tests for Class 12</p>
</div>

<!-- STATS -->
<div class="stats">
  <div class="box"><h2 id="total-chapters">0</h2><p>Chapters</p></div>
  <div class="box"><h2 id="total-questions">0</h2><p>Questions</p></div>
</div>

<!-- STUDENT FORM -->
<div class="form-section" id="form-section">
  <h2>Enter Your Details</h2>
  <input type="text" id="studentName" placeholder="Enter your name" required>
  <input type="email" id="studentEmail" placeholder="Enter your email" required>
  <p>Select a Chapter to Start Test:</p>
  <div class="container" id="chapter-container"></div>
</div>

<!-- TEST SECTION -->
<div class="test-section" id="test-section" style="display:none;">
  <div id="question-container"></div>
</div>

<!-- RESULTS -->
<div class="results" id="results" style="display:none;">
  <h2>Test Results</h2>
  <p id="student-info"></p>
  <p id="score"></p>
  <div id="review"></div>
</div>

<!-- FOOTER -->
<div class="footer">© 2026 Physics Test Series | Made by You 😎</div>

<script>
  // ======== DATA ========
  let student = {name:"", email:""};
  let currentChapter = null;
  const chapters = {
    "Chapter 1": {
      desc:"Electric Charges & Fields",
      questions:[
        {q:"What is 2 + 2?", options:["3","4","5","6"], answer:1},
        {q:"Capital of India?", options:["Delhi","Mumbai","Kolkata","Chennai"], answer:0},
        {q:"Which planet is known as Red Planet?", options:["Earth","Venus","Mars","Jupiter"], answer:2}
      ]
    },
    "Chapter 2": {desc:"Electrostatic Potential", questions:[]},
    "Chapter 3": {desc:"Current Electricity", questions:[]}
  };

  let currentQ=0, userAnswers=[];

  // ======== INITIALIZE CHAPTER CARDS ========
  const chapterContainer = document.getElementById('chapter-container');
  Object.keys(chapters).forEach(ch => {
    const card = document.createElement('div');
    card.className="card";
    const chData = chapters[ch];
    card.innerHTML=`<h3>${ch}</h3><p>${chData.desc}</p>`;
    const btn = document.createElement('button');
    btn.className="btn";
    if(chData.questions.length>0){
      btn.innerText="Start Test";
      btn.onclick = ()=>startChapter(ch);
    } else {
      btn.innerText="Coming Soon";
      btn.disabled=true;
      btn.title="Coming Soon";
    }
    card.appendChild(btn);
    chapterContainer.appendChild(card);
  });

  // Update stats dynamically
  document.getElementById('total-chapters').innerText = Object.keys(chapters).length;
  let totalQ = 0;
  Object.values(chapters).forEach(ch=> totalQ += ch.questions.length);
  document.getElementById('total-questions').innerText = totalQ;

  // ======== FUNCTIONS ========
  function startChapter(chapterName){
    const name = document.getElementById('studentName').value.trim();
    const email = document.getElementById('studentEmail').value.trim();
    if(name === "" || email === ""){
      alert("Please enter your name and email");
      return;
    }
    student.name = name;
    student.email = email;
    currentChapter = chapterName;
    currentQ = 0;
    userAnswers=[];
    document.getElementById('form-section').style.display="none";
    document.getElementById('test-section').style.display="block";
    showQuestion();
  }

  function showQuestion(){
    const container = document.getElementById('question-container');
    container.innerHTML="";
    const qArr = chapters[currentChapter].questions;
    if(currentQ < qArr.length){
      const qObj = qArr[currentQ];
      const qDiv = document.createElement('div');
      qDiv.className="test-question";
      qDiv.innerHTML=`<strong>Q${currentQ+1}: ${qObj.q}</strong>`;
      container.appendChild(qDiv);
      qObj.options.forEach((opt, idx)=>{
        const btn = document.createElement('button');
        btn.className="answer-btn";
        btn.innerText=opt;
        btn.onclick=()=>selectAnswer(idx);
        container.appendChild(btn);
      });
    } else submitTest();
  }

  function selectAnswer(idx){
    userAnswers.push(idx);
    currentQ++;
    showQuestion();
  }

  function submitTest(){
    document.getElementById('test-section').style.display="none";
    document.getElementById('results').style.display="block";
    document.getElementById('student-info').innerText=`Name: ${student.name}, Email: ${student.email}, Chapter: ${currentChapter}`;
    const qArr = chapters[currentChapter].questions;
    let score=0, reviewHTML="<h3>Review:</h3>";
    qArr.forEach((q,i)=>{
      if(userAnswers[i]===q.answer) score++;
      reviewHTML+=`<p>Q${i+1}: Your answer: ${q.options[userAnswers[i]] || "No Answer"} | Correct: ${q.options[q.answer]} ${userAnswers[i]===q.answer?'<span class="correct">✔</span>':'<span class="wrong">✖</span>'}</p>`;
    });
    document.getElementById('score').innerText=`Score: ${score} / ${qArr.length}`;
    document.getElementById('review').innerHTML=reviewHTML;
  }
</script>

</body>
</html>
