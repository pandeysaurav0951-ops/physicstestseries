 <!DOCTYPE html>
<html>
<head>
  <title>Physics Test</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      margin-top: 120px;
      animation: fadeIn 1s ease-in;
    }

    h1 {
      font-size: 40px;
      color: #38bdf8;
      animation: slideDown 1s ease;
    }

    p {
      font-size: 18px;
      margin-top: 10px;
      color: #cbd5f5;
    }

    button {
      margin-top: 30px;
      padding: 15px 30px;
      background: #38bdf8;
      border: none;
      border-radius: 10px;
      color: black;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px #38bdf8;
    }

    button:hover {
      background: #0ea5e9;
      transform: scale(1.1);
      box-shadow: 0 0 20px #0ea5e9;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    /* Floating circles background */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(56,189,248,0.2);
      animation: float 10s infinite;
    }

    .circle:nth-child(1) {
      width: 100px;
      height: 100px;
      left: 10%;
      top: 80%;
    }

    .circle:nth-child(2) {
      width: 150px;
      height: 150px;
      left: 70%;
      top: 90%;
      animation-duration: 12s;
    }

    .circle:nth-child(3) {
      width: 80px;
      height: 80px;
      left: 40%;
      top: 100%;
      animation-duration: 8s;
    }

    @keyframes float {
      0% { transform: translateY(0); }
      100% { transform: translateY(-1000px); }
    }
  </style>

</head>

<body>

<div class="container">
  <h1>Physics Test Series</h1>
  <p>Practice Chapter-wise Tests for Class 12</p>

  <a href="chapter1.html">
    <button>Start Chapter 1</button>
  </a>
</div>

<!-- Background animation -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

</body>
</html>
