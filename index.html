 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Series Platform - Professional</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box; font-family: Arial,sans-serif;}
  body {background:#f0f2f5;}
  header {background:#4CAF50; color:white; padding:15px 20px; display:flex; justify-content:space-between; align-items:center;}
  header nav a {color:white; margin-left:15px; text-decoration:none; font-weight:bold;}
  .container {max-width:800px; margin:40px auto; background:white; padding:30px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
  .hero {text-align:center; margin-bottom:40px;}
  .hero h2 {margin-bottom:10px;}
  .hero button {padding:10px 25px; background:#4CAF50; border:none; color:white; font-size:16px; border-radius:5px; cursor:pointer;}
  .question-card {padding:20px; border-radius:8px; background:#e8f5e9; margin-bottom:20px; transition: all 0.3s ease;}
  .question-card h3 {margin-bottom:15px;}
  .answers button {display:block; margin:10px 0; padding:10px; width:100%; border:none; border-radius:5px; cursor:pointer; background:#81C784; color:white; font-size:16px;}
  .answers button:hover {background:#66BB6A;}
  #progress-bar {height:10px; background:#c8e6c9; border-radius:5px; overflow:hidden; margin-bottom:20px;}
  #progress {height:100%; width:0%; background:#4CAF50;}
  .results {display:none;}
  .results h2 {margin-bottom:20px;}
  .correct {color:green; font-weight:bold;}
  .wrong {color:red; font-weight:bold;}
  footer {text-align:center; padding:20px; background:#333; color:white; margin-top:50px;}
  @media(max-width:600px){.container{padding:20px;}}
</style>
</head>
<body>

<header>
  <h1>Test Series Platform</h1>
  <nav>
    <a href="#home">Home</a>
    <a href="#features">Features</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="container">
  <!-- Hero Section -->
  <div class="hero" id="home">
    <h2>Prepare, Practice, Perfect!</h2>
    <p>Attempt tests, get instant results, and track your performance.</p>
    <button onclick="startTest()">Start Test</button>
  </div>

  <!-- Progress Bar -->
  <div id="progress-bar" style="display:none;">
    <div id="progress"></div>
  </div>

  <!-- Question Section -->
  <div id="question-section" style="display:none;"></div>

  <!-- Results Section -->
  <div class="results" id="results">
    <h2>Test Results</h2>
    <p id="score"></p>
    <div id="review"></div>
  </div>
</div>

<footer>
  &copy; 2026 Test Series Platform | Contact: info@testseries.com
</footer>

<script>
  const questions = [
    { q: "What is 2 + 2?", options:["3","4","5","6"], answer:1 },
    { q: "Capital of India?", options:["Delhi","Mumbai","Kolkata","Chennai"], answer:0 },
    { q: "Which planet is known as Red Planet?", options:["Earth","Venus","Mars","Jupiter"], answer:2 }
  ];

  let currentQ = 0;
  let userAnswers = [];

  function startTest(){
    document.querySelector('.hero').style.display = 'none';
    document.getElementById('question-section').style.display = 'block';
    document.getElementById('progress-bar').style.display = 'block';
    showQuestion();
  }

  function showQuestion(){
    const container = document.getElementById('question-section');
    container.innerHTML = "";
    if(currentQ < questions.length){
      const qObj = questions[currentQ];
      const card = document.createElement('div');
      card.className = "question-card";
      card.innerHTML = `<h3>Q${currentQ+1}: ${qObj.q}</h3><div class="answers"></div>`;
      container.appendChild(card);

      const answersDiv = card.querySelector('.answers');
      qObj.options.forEach((opt, idx)=>{
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = ()=> selectAnswer(idx);
        answersDiv.appendChild(btn);
      });

      // Update progress bar
      const progress = document.getElementById('progress');
      progress.style.width = ((currentQ)/questions.length)*100 + "%";
    } else {
      submitTest();
    }
  }

  function selectAnswer(idx){
    userAnswers.push(idx);
    currentQ++;
    showQuestion(); // Auto move to next question
  }

  function submitTest(){
    document.getElementById('question-section').style.display = 'none';
    document.getElementById('progress-bar').style.display = 'none';
    document.getElementById('results').style.display = 'block';

    let score = 0;
    let reviewHTML = "<h3>Review:</h3>";
    questions.forEach((q,i)=>{
      if(userAnswers[i] === q.answer) score++;
      reviewHTML += `<p>Q${i+1}: Your answer: ${q.options[userAnswers[i]] || "No Answer"} | Correct: ${q.options[q.answer]} 
      ${userAnswers[i] === q.answer ? '<span class="correct">✔</span>' : '<span class="wrong">✖</span>'}</p>`;
    });

    document.getElementById('score').innerText = `Your Score: ${score} / ${questions.length}`;
    document.getElementById('review').innerHTML = reviewHTML;
  }
</script>

</body>
</html>
